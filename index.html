<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="日文單字卡">
<title>日文單字卡</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --ink:#f5f0e8;--paper:#ffffff;--red:#c0392b;--gold:#9a7010;
  --grey:#6a6058;--card-h:220px;
}
html,body{height:100%;background:#e8e2d8 !important;}
body{
  background:var(--ink);
  font-family:'Noto Serif TC',serif;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:16px 12px;
  user-select:none;
  position:relative;
  min-height:100vh;
  min-height:-webkit-fill-available;
}
/* ── Overlay ── */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.78);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.overlay.hidden{display:none;}
/* ── Menu ── */
#menu-panel{
  position:fixed;top:0;left:0;bottom:0;
  width:min(300px,88vw);
  background:#1a1612;
  border-right:1px solid rgba(255,255,255,0.07);
  box-shadow:6px 0 40px rgba(0,0,0,0.7);
  display:flex;flex-direction:column;
  z-index:201;transform:translateX(-100%);
  transition:transform 0.25s ease;
}
#menu-panel.open{transform:translateX(0);}
.menu-head{
  padding:20px 16px 14px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:flex-start;justify-content:space-between;
}
.menu-title{color:#fff;font-size:15px;font-weight:600;}
.menu-sub{color:rgba(255,255,255,0.28);font-size:11px;margin-top:3px;}
.menu-bar-wrap{margin-top:7px;height:3px;border-radius:2px;background:rgba(255,255,255,0.08);width:160px;overflow:hidden;}
.menu-bar-fill{height:100%;background:linear-gradient(90deg,#c0392b,#e07060);border-radius:2px;transition:width 0.4s;}
.menu-close{background:none;border:none;color:rgba(255,255,255,0.35);font-size:18px;cursor:pointer;padding:2px 6px;}
.menu-list{flex:1;overflow-y:auto;padding-bottom:20px;margin-top:10px;}
.menu-item{
  padding:10px 16px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
  border-left:3px solid transparent;
  transition:all 0.15s;
}
.menu-item.active{background:rgba(255,255,255,0.04);}
.menu-check{
  width:17px;height:17px;border-radius:4px;flex-shrink:0;
  border:2px solid rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#fff;font-weight:700;
  transition:all 0.15s;
}
.menu-icon{font-size:14px;flex-shrink:0;}
.menu-label{color:rgba(255,255,255,0.45);font-size:13px;transition:color 0.15s;}
.menu-item.active .menu-label{color:#fff;}
.menu-prog{display:flex;align-items:center;gap:6px;margin-top:3px;}
.menu-prog-bar{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,0.07);overflow:hidden;}
.menu-prog-fill{height:100%;border-radius:2px;transition:width 0.3s;}
.menu-prog-num{font-size:10px;color:rgba(255,255,255,0.25);white-space:nowrap;}
/* ── Top bar ── */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  width:min(340px,96vw);margin-bottom:12px;
}
.btn-sm{
  background:rgba(255,255,255,0.8);
  border:1px solid rgba(0,0,0,0.1);
  color:rgba(0,0,0,0.65);
  border-radius:10px;padding:7px 13px;font-size:12px;
  cursor:pointer;display:flex;align-items:center;gap:5px;
  font-family:'Noto Serif TC',serif;
}
.hint-txt{color:rgba(0,0,0,0.3);font-size:10px;letter-spacing:0.2em;}
.save-btn{
  background:rgba(255,255,255,0.8);
  border:1px solid rgba(0,0,0,0.1);
  color:rgba(0,0,0,0.55);
  border-radius:10px;padding:6px 12px;font-size:11px;
  cursor:pointer;display:flex;align-items:center;gap:5px;
  font-family:'Noto Serif TC',serif;
}
.save-count{color:#9a7010;font-weight:600;}
/* ── Card wrapper ── */
#card-wrap{
  width:min(340px,96vw);
  transition:opacity 0.19s,transform 0.19s;
}
#card-wrap.anim-fwd{opacity:0;transform:translateX(-12px) scale(0.97);}
#card-wrap.anim-back{opacity:0;transform:translateX(12px) scale(0.97);}
/* ── Card ── */
#card{
  position:relative;height:var(--card-h);border-radius:18px;
  overflow:hidden;
  box-shadow:0 12px 40px rgba(0,0,0,0.15),0 0 0 1px rgba(0,0,0,0.06);
  cursor:grab;touch-action:none;
}
#card:active{cursor:grabbing;}
.learned-border{
  position:absolute;inset:0;z-index:35;pointer-events:none;
  border:2px solid rgba(0,200,80,0.28);border-radius:18px;
  display:none;
}
.learned-border.show{display:block;}
/* Back layer */
#back{
  position:absolute;inset:0;
  background:linear-gradient(135deg,#f0ead8 0%,#e8dcc8 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
}
.level-badge{
  position:absolute;top:12px;left:12px;
  font-size:10px;padding:3px 9px;border-radius:12px;
  letter-spacing:0.08em;font-weight:600;
}
.learned-tag{
  position:absolute;top:11px;right:11px;font-size:10px;
  background:rgba(0,160,70,0.15);color:#1a8040;
  border-radius:10px;padding:2px 8px;display:none;
}
.learned-tag.show{display:block;}
.card-cat{color:#7a5010;font-size:11px;letter-spacing:0.2em;font-weight:600;}
#card-jp{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(1.4rem,8vw,2.7rem);
  font-weight:400;color:#1a1208;line-height:1;
  letter-spacing:0.04em;text-align:center;padding:0 14px;
}
.card-kana{font-family:'Noto Serif JP',serif;font-size:13px;color:rgba(0,0,0,0.3);letter-spacing:0.15em;}
.slide-hint{position:absolute;bottom:11px;font-size:9px;color:rgba(0,0,0,0.18);letter-spacing:0.18em;}
/* Front reveal layer */
#front{
  position:absolute;inset:0;background:#fff;
  clip-path:inset(0 100% 0 0);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:14px 26px;
}
#front::before{
  content:'';position:absolute;top:14px;bottom:14px;left:0;
  width:3px;background:var(--red);border-radius:0 2px 2px 0;
}
.rev-label{font-size:10px;letter-spacing:0.28em;color:var(--grey);}
#rev-meaning{
  font-family:'Noto Serif TC',serif;
  font-size:clamp(1rem,5.5vw,1.75rem);
  font-weight:400;color:#1a1410;line-height:1.2;text-align:center;
}
.rev-romaji{font-family:'Noto Serif JP',serif;font-size:12px;color:var(--red);}
.rev-example{font-family:'Noto Serif JP',serif;font-size:11px;color:#7a6a58;text-align:center;margin-top:5px;line-height:1.75;}
.rev-tw{font-family:'Noto Serif TC',serif;font-size:10px;color:#aaa;}
/* Handle */
#handle{
  position:absolute;top:50%;left:0%;
  transform:translate(-50%,-50%);
  width:40px;height:40px;border-radius:50%;
  background:#fff;z-index:10;pointer-events:none;
  box-shadow:0 3px 14px rgba(0,0,0,0.15),0 0 0 3px rgba(192,57,43,0.25);
  display:flex;align-items:center;justify-content:center;
}
/* Flash */
#flash{
  position:absolute;inset:0;z-index:50;
  display:none;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.6);border-radius:18px;font-size:56px;
}
#flash.show{display:flex;}
/* Controls */
#controls{display:flex;align-items:center;justify-content:center;gap:9px;margin-top:15px;}
.btn-round{
  width:40px;height:40px;border-radius:50%;
  border:1px solid rgba(0,0,0,0.1);
  background:rgba(255,255,255,0.75);
  color:rgba(0,0,0,0.5);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Serif TC',serif;
}
.btn-round:disabled{color:rgba(0,0,0,0.18);cursor:default;}
#btn-speak{
  width:42px;height:42px;border-radius:50%;
  border:1px solid rgba(0,0,0,0.1);
  background:rgba(255,255,255,0.75);
  color:rgba(0,0,0,0.5);font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
#btn-speak.speaking{
  border-color:rgba(100,180,255,0.5);
  background:rgba(100,180,255,0.12);
  color:#80c8ff;
}
#btn-learned{
  flex:1;max-width:120px;height:42px;border-radius:21px;
  border:1px solid rgba(0,0,0,0.1);
  background:rgba(255,255,255,0.75);
  color:rgba(0,0,0,0.45);font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all 0.2s;font-family:'Noto Serif TC',serif;
}
#btn-learned.active{
  border-color:rgba(0,200,80,0.4);
  background:rgba(0,180,80,0.15);
  color:#4dc87a;
}
#filter-hint{
  text-align:center;margin-top:9px;min-height:16px;
  color:rgba(0,0,0,0.35);font-size:10px;
}
/* review mode toggle */
#review-bar{
  display:flex;align-items:center;justify-content:center;
  gap:8px;margin-top:8px;
}
#btn-review-toggle{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.7);border:1px solid rgba(0,0,0,0.1);
  border-radius:20px;padding:5px 13px;font-size:11px;
  color:rgba(0,0,0,0.45);cursor:pointer;
  font-family:'Noto Serif TC',serif;transition:all 0.2s;
}
#btn-review-toggle.on{
  background:rgba(192,57,43,0.1);border-color:rgba(192,57,43,0.35);
  color:#c0392b;
}
.review-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(0,0,0,0.15);transition:background 0.2s;flex-shrink:0;
}
#btn-review-toggle.on .review-dot{background:#c0392b;}
/* ── Backup panel ── */
#backup-box{
  background:#1e1a16;border-radius:16px;padding:22px 20px;
  width:min(320px,92vw);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
}
#backup-box h3{color:#fff;font-size:15px;font-weight:600;margin-bottom:4px;}
.backup-desc{color:rgba(255,255,255,0.35);font-size:11px;margin-bottom:14px;line-height:1.7;}
#code-display{
  background:rgba(255,255,255,0.06);border-radius:10px;
  padding:10px 12px;margin-bottom:10px;
  word-break:break-all;font-size:11px;color:var(--gold);
  font-family:monospace;line-height:1.7;min-height:36px;
}
#btn-copy{
  width:100%;padding:11px;border-radius:10px;border:none;
  background:var(--red);color:#fff;font-size:13px;
  cursor:pointer;font-weight:600;margin-bottom:16px;
  transition:background 0.2s;font-family:'Noto Serif TC',serif;
}
#btn-copy.copied{background:#27ae60;}
.restore-label{color:rgba(255,255,255,0.4);font-size:11px;margin-bottom:6px;}
#restore-input{
  width:100%;height:60px;border-radius:10px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.05);color:#fff;
  font-size:11px;padding:8px 10px;resize:none;
  font-family:monospace;outline:none;box-sizing:border-box;
}
#restore-msg{color:#4dc87a;font-size:12px;margin-top:5px;min-height:18px;}
.backup-btns{display:flex;gap:8px;margin-top:10px;}
.backup-btns button{
  flex:1;padding:10px;border-radius:10px;font-size:12px;
  cursor:pointer;font-family:'Noto Serif TC',serif;
}
#btn-restore{border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fff;}
#btn-reset-all{border:1px solid rgba(255,80,60,0.3);background:rgba(192,57,43,0.08);color:#e07060;}
#btn-close-backup{
  width:100%;padding:9px;border-radius:10px;margin-top:8px;
  border:1px solid rgba(255,255,255,0.08);
  background:transparent;color:rgba(255,255,255,0.3);
  font-size:12px;cursor:pointer;font-family:'Noto Serif TC',serif;
}
/* ── Map modal ── */
#map-box{
  background:#16130f;border-radius:18px;padding:18px 16px;
  width:min(340px,96vw);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 20px 60px rgba(0,0,0,0.8);
}
#map-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
#map-title{color:#fff;font-size:14px;font-weight:600;}
#map-region-tag{
  font-size:11px;padding:3px 10px;border-radius:10px;
  background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);
  transition:all 0.2s;
}
#map-region-tag.selected{background:rgba(192,57,43,0.2);color:#e07060;}
#map-close{background:none;border:none;color:rgba(255,255,255,0.35);font-size:17px;cursor:pointer;}
#japan-map{width:100%;max-height:320px;display:block;margin:0 auto;}
.region{
  fill-opacity:0.55;stroke:#1a1612;stroke-width:1.5;
  cursor:pointer;transition:fill-opacity 0.15s,stroke 0.15s;
}
.region:hover{fill-opacity:0.85;stroke:rgba(255,255,255,0.3);}
.region.active{fill-opacity:1;stroke:#fff;stroke-width:2;}
.region-label{
  font-size:9px;fill:rgba(255,255,255,0.9);
  text-anchor:middle;dominant-baseline:central;
  pointer-events:none;font-weight:600;letter-spacing:0.05em;
}
#map-footer{display:flex;gap:8px;margin-top:12px;}
#map-footer button{
  flex:1;padding:9px;border-radius:10px;font-size:12px;cursor:pointer;
  font-family:'Noto Serif TC',serif;transition:all 0.15s;
}
#btn-map-all{border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);}
#btn-map-confirm{border:none;background:#c0392b;color:#fff;font-weight:600;}
#btn-map-confirm:disabled{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.25);cursor:default;}
.map-btn{
  background:rgba(255,255,255,0.8);
  border:1px solid rgba(0,0,0,0.1);
  color:rgba(0,0,0,0.6);
  border-radius:10px;padding:7px 11px;font-size:14px;
  cursor:pointer;
}
/* ── Quiz ── */
#quiz-overlay{z-index:210;}
#quiz-box{
  background:#fff;border-radius:20px;
  width:min(360px,96vw);max-height:88vh;overflow-y:auto;
  border:1px solid rgba(0,0,0,0.08);
  box-shadow:0 24px 70px rgba(0,0,0,0.45);
}
#quiz-header{
  padding:14px 16px 10px;border-bottom:1px solid rgba(0,0,0,0.07);
  display:flex;align-items:center;justify-content:space-between;
  background:#fff;position:sticky;top:0;z-index:2;
}
#quiz-title{color:#1a1410;font-size:14px;font-weight:600;}
#quiz-close{background:none;border:none;color:rgba(0,0,0,0.3);font-size:18px;cursor:pointer;padding:2px 6px;}
#quiz-setup{padding:18px 16px 20px;display:none;background:#fff;}
.quiz-setup-label{color:rgba(0,0,0,0.4);font-size:11px;letter-spacing:0.15em;margin-bottom:8px;}
.quiz-mode-row{display:flex;gap:8px;margin-bottom:14px;}
.quiz-mode-btn{
  flex:1;padding:10px 6px;border-radius:12px;font-size:12px;
  border:1px solid rgba(0,0,0,0.12);background:#f7f5f2;color:rgba(0,0,0,0.45);
  cursor:pointer;font-family:'Noto Serif TC',serif;text-align:center;line-height:1.5;transition:all 0.15s;
}
.quiz-mode-btn.sel{background:rgba(192,57,43,0.1);border-color:rgba(192,57,43,0.4);color:#c0392b;}
.quiz-scope-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.quiz-scope-btn{
  padding:6px 12px;border-radius:10px;font-size:11px;
  border:1px solid rgba(0,0,0,0.1);background:#f7f5f2;color:rgba(0,0,0,0.45);
  cursor:pointer;font-family:'Noto Serif TC',serif;transition:all 0.15s;
}
.quiz-scope-btn.sel{background:rgba(200,160,60,0.15);border-color:rgba(200,160,60,0.5);color:#9a7010;}
#quiz-count-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
#quiz-count-label{color:rgba(0,0,0,0.4);font-size:11px;white-space:nowrap;}
#quiz-count-slider{flex:1;accent-color:#c0392b;}
#quiz-count-val{color:#c0392b;font-size:13px;font-weight:600;min-width:28px;}
#btn-quiz-start{
  width:100%;padding:13px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#c0392b,#e05a4a);
  color:#fff;font-size:14px;font-weight:600;cursor:pointer;
  font-family:'Noto Serif TC',serif;
}
#quiz-play{padding:14px 16px 18px;display:none;background:#fff;}
#quiz-progress-bar-wrap{height:3px;background:rgba(0,0,0,0.08);border-radius:2px;margin-bottom:14px;overflow:hidden;}
#quiz-progress-bar{height:100%;background:linear-gradient(90deg,#c0392b,#e07060);border-radius:2px;transition:width 0.3s;}
#quiz-q-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
#quiz-q-num{font-size:11px;color:rgba(0,0,0,0.3);}
#quiz-direction-badge{font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(0,0,0,0.06);color:rgba(0,0,0,0.4);}
#quiz-question-box{
  background:#f7f5f2;border-radius:14px;
  padding:16px 15px;margin-bottom:13px;border:1px solid rgba(0,0,0,0.07);
}
.quiz-q-direction{font-size:10px;color:rgba(0,0,0,0.3);letter-spacing:0.18em;margin-bottom:10px;text-align:center;}
.quiz-sentence{
  font-family:'Noto Serif JP',serif;font-size:clamp(14px,4.2vw,17px);
  color:rgba(0,0,0,0.82);line-height:2.2;text-align:center;word-break:break-all;
}
.quiz-sentence.zh-sent{font-family:'Noto Serif TC',serif;font-size:clamp(13px,4vw,15px);}
/* red underline for sentence-pattern portion */
.quiz-pattern-ul{
  border-bottom:3px solid #c0392b;
  padding-bottom:1px;color:#c0392b;font-weight:600;
}
/* blank box for regular vocab */
.quiz-blank{
  display:inline-block;background:rgba(192,57,43,0.1);
  border-bottom:3px solid #c0392b;color:#c0392b;font-weight:700;
  padding:1px 10px;border-radius:4px 4px 0 0;min-width:2em;text-align:center;
}
.quiz-sentence-tw{
  font-family:'Noto Serif TC',serif;font-size:11px;color:rgba(0,0,0,0.3);
  text-align:center;margin-top:8px;line-height:1.6;
}
#quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.quiz-choice{
  padding:12px 8px;border-radius:12px;
  border:1px solid rgba(0,0,0,0.1);background:#f7f5f2;
  color:rgba(0,0,0,0.7);font-size:13px;
  cursor:pointer;font-family:'Noto Serif TC',serif;
  text-align:center;line-height:1.4;transition:all 0.15s;
}
.quiz-choice:hover:not(:disabled){background:#ede8e0;border-color:rgba(0,0,0,0.2);}
.quiz-choice.selected{background:rgba(192,57,43,0.1);border-color:#c0392b;color:#c0392b;font-weight:600;}
.quiz-choice:disabled{cursor:default;}
#btn-quiz-confirm{
  width:100%;padding:13px;border-radius:12px;border:none;
  background:#e8e2da;color:rgba(0,0,0,0.25);
  font-size:14px;font-weight:600;cursor:default;
  font-family:'Noto Serif TC',serif;transition:all 0.2s;
}
#btn-quiz-confirm.ready{background:linear-gradient(135deg,#c0392b,#e05a4a);color:#fff;cursor:pointer;}
#quiz-result{padding:18px 16px 20px;display:none;background:#fff;}
.quiz-result-top{text-align:center;padding-bottom:16px;border-bottom:1px solid rgba(0,0,0,0.07);margin-bottom:14px;}
#quiz-result-emoji{font-size:44px;margin-bottom:6px;}
#quiz-result-title{color:#1a1410;font-size:17px;font-weight:600;margin-bottom:2px;}
#quiz-result-score{font-size:38px;font-weight:700;color:#c0392b;margin:6px 0 2px;letter-spacing:-1px;}
#quiz-result-detail{color:rgba(0,0,0,0.35);font-size:12px;}
.quiz-review-label{font-size:10px;letter-spacing:0.18em;color:rgba(0,0,0,0.3);margin-bottom:10px;}
.quiz-review-item{background:#f7f5f2;border-radius:12px;border:1px solid rgba(0,0,0,0.07);padding:12px 13px;margin-bottom:8px;}
.quiz-review-sentence{font-family:'Noto Serif JP',serif;font-size:12px;color:rgba(0,0,0,0.55);line-height:1.9;margin-bottom:6px;word-break:break-all;}
.quiz-review-sentence.zh-sent{font-family:'Noto Serif TC',serif;}
.quiz-review-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.quiz-review-your{font-size:12px;padding:3px 9px;border-radius:8px;background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.25);color:#c0392b;font-family:'Noto Serif JP',serif;}
.quiz-review-arrow{color:rgba(0,0,0,0.2);font-size:12px;}
.quiz-review-correct{font-size:12px;padding:3px 9px;border-radius:8px;background:rgba(0,140,60,0.1);border:1px solid rgba(0,140,60,0.25);color:#1a7a3a;font-family:'Noto Serif JP',serif;}
.quiz-review-none{color:rgba(0,0,0,0.3);font-size:13px;text-align:center;padding:10px 0;font-family:'Noto Serif TC',serif;}
.quiz-result-btns{display:flex;gap:8px;margin-top:14px;}
.quiz-result-btns button{flex:1;padding:11px;border-radius:11px;font-size:13px;cursor:pointer;font-family:'Noto Serif TC',serif;}
#btn-quiz-retry{border:1px solid rgba(192,57,43,0.3);background:rgba(192,57,43,0.08);color:#c0392b;}
#btn-quiz-back-setup{border:1px solid rgba(0,0,0,0.1);background:#f0ece6;color:rgba(0,0,0,0.5);}

/* ── Search ── */
#btn-search{
  background:rgba(255,255,255,0.7);border:1px solid rgba(0,0,0,0.1);
  color:rgba(0,0,0,0.5);border-radius:10px;padding:7px 11px;font-size:15px;
  cursor:pointer;
}
#search-overlay{z-index:210;}
#search-box{
  background:#fff;border-radius:20px;
  width:min(360px,96vw);max-height:80vh;
  border:1px solid rgba(0,0,0,0.08);
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  display:flex;flex-direction:column;overflow:hidden;
}
#search-header{
  padding:12px 14px;border-bottom:1px solid rgba(0,0,0,0.07);
  display:flex;align-items:center;gap:8px;
}
#search-input{
  flex:1;border:none;outline:none;font-size:16px;
  font-family:'Noto Serif JP',serif;color:#1a1410;background:transparent;
}
#search-input::placeholder{color:rgba(0,0,0,0.25);font-family:'Noto Serif TC',serif;font-size:14px;}
#search-close{background:none;border:none;color:rgba(0,0,0,0.3);font-size:18px;cursor:pointer;padding:2px 6px;}
#search-results{flex:1;overflow-y:auto;padding:6px 0;}
.search-item{
  padding:11px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(0,0,0,0.04);transition:background 0.1s;
}
.search-item:hover{background:#f7f5f2;}
.search-item:last-child{border-bottom:none;}
.si-jp{font-family:'Noto Serif JP',serif;font-size:17px;color:#1a1410;font-weight:300;}
.si-kana{font-family:'Noto Serif JP',serif;font-size:11px;color:rgba(0,0,0,0.3);margin-top:1px;}
.si-meaning{font-family:'Noto Serif TC',serif;font-size:13px;color:rgba(0,0,0,0.55);margin-left:auto;text-align:right;}
.si-badge{
  font-size:9px;padding:2px 6px;border-radius:6px;
  background:rgba(0,0,0,0.06);color:rgba(0,0,0,0.35);white-space:nowrap;
}
#search-empty{
  padding:32px 16px;text-align:center;
  color:rgba(0,0,0,0.3);font-size:13px;font-family:'Noto Serif TC',serif;
}
</style>
</head>
<body>

<!-- Quiz overlay -->
<div class="overlay hidden" id="quiz-overlay" onclick="closeQuiz()">
  <div id="quiz-box" onclick="event.stopPropagation()">
    <div id="quiz-header">
      <div id="quiz-title">📝 單字測驗</div>
      <button id="quiz-close" onclick="closeQuiz()">✕</button>
    </div>

    <!-- Setup -->
    <div id="quiz-setup">
      <div class="quiz-setup-label">題目方向</div>
      <div class="quiz-mode-row">
        <div class="quiz-mode-btn sel" data-mode="jp2zh" onclick="selectQuizMode(this)">🇯🇵 日文<br>→ 選中文</div>
        <div class="quiz-mode-btn" data-mode="zh2jp" onclick="selectQuizMode(this)">🇹🇼 中文<br>→ 選日文</div>
        <div class="quiz-mode-btn" data-mode="mix" onclick="selectQuizMode(this)">🔀 混合<br>題型</div>
      </div>
      <div class="quiz-setup-label">出題範圍</div>
      <div class="quiz-scope-row" id="quiz-scope-row">
        <div class="quiz-scope-btn sel" data-scope="ALL" onclick="selectQuizScope(this)">全部</div>
      </div>
      <div id="quiz-count-row">
        <div id="quiz-count-label">題數</div>
        <input id="quiz-count-slider" type="range" min="5" max="30" value="10" step="5" oninput="document.getElementById('quiz-count-val').textContent=this.value">
        <div id="quiz-count-val">10</div>
      </div>
      <button id="btn-quiz-start" onclick="startQuiz()">開始測驗</button>
    </div>

    <!-- Playing -->
    <div id="quiz-play">
      <div id="quiz-progress-bar-wrap"><div id="quiz-progress-bar" style="width:0%"></div></div>
      <div id="quiz-q-meta">
        <div id="quiz-q-num">1 / 10</div>
        <div id="quiz-direction-badge">日→中</div>
        <div style="width:40px"></div>
      </div>
      <div id="quiz-question-box">
        <div class="quiz-q-direction" id="quiz-q-direction">請選出句中 ＿＿＿ 的中文意思</div>
        <div class="quiz-sentence" id="quiz-sentence"></div>
        <div class="quiz-sentence-tw" id="quiz-sentence-tw"></div>
      </div>
      <div id="quiz-choices"></div>
      <button id="btn-quiz-confirm" onclick="confirmQuiz()">請先選擇答案</button>
    </div>

    <!-- Result -->
    <div id="quiz-result">
      <div class="quiz-result-top">
        <div id="quiz-result-emoji">🎉</div>
        <div id="quiz-result-title">測驗完成！</div>
        <div id="quiz-result-score">8/10</div>
        <div id="quiz-result-detail">答對率 80%</div>
      </div>
      <div class="quiz-review-label" id="quiz-review-label">✗ 答錯的題目</div>
      <div id="quiz-review-list"></div>
      <div class="quiz-result-btns">
        <button id="btn-quiz-retry" onclick="retryQuiz()">再來一次</button>
        <button id="btn-quiz-back-setup" onclick="backToSetup()">重新設定</button>
      </div>
    </div>
  </div>
</div>

<!-- Search overlay -->
<div class="overlay hidden" id="search-overlay" onclick="closeSearch()">
  <div id="search-box" onclick="event.stopPropagation()">
    <div id="search-header">
      <span style="font-size:15px">🔍</span>
      <input id="search-input" placeholder="輸入日文或中文搜尋…" oninput="renderSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
      <button id="search-close" onclick="closeSearch()">✕</button>
    </div>
    <div id="search-results"></div>
  </div>
</div>

<!-- Map overlay -->

  <div id="map-box" onclick="event.stopPropagation()">

      <button id="btn-map-all" onclick="applyMapFilter(null)">全部地名</button>
      <button id="btn-map-confirm" onclick="applyMapFilter(selectedMapRegion)" disabled>確認選擇</button>
    </div>
  </div>
</div>

<!-- Menu overlay -->
<div class="overlay hidden" id="menu-overlay" onclick="closeMenu()"></div>
<div id="menu-panel">
  <div class="menu-head">
    <div>
      <div class="menu-title">學習分類</div>
      <div class="menu-sub">已學會 <span id="menu-count" style="color:var(--gold)">0</span> / <span id="menu-total">0</span> 個</div>
      <div class="menu-bar-wrap"><div class="menu-bar-fill" id="menu-bar" style="width:0%"></div></div>
    </div>
    <button class="menu-close" onclick="closeMenu()">✕</button>
  </div>
  <div class="menu-list" id="menu-list"></div>
</div>

<!-- Backup overlay -->
<div class="overlay hidden" id="backup-overlay" onclick="closeBackup()">
  <div id="backup-box" onclick="event.stopPropagation()">
    <h3>📋 備份 / 還原進度</h3>
    <p class="backup-desc">進度自動存在手機裡（localStorage）。<br>換裝置時可用備份碼轉移。</p>
    <div id="code-display">—</div>
    <button id="btn-copy" onclick="copyCode()">複製備份碼</button>
    <div class="restore-label">貼上備份碼還原：</div>
    <textarea id="restore-input" placeholder="貼上備份碼..."></textarea>
    <div id="restore-msg"></div>
    <div class="backup-btns">
      <button id="btn-restore" onclick="applyRestore()">還原進度</button>
      <button id="btn-reset-all" onclick="resetAll()">重置記錄</button>
    </div>
    <button id="btn-close-backup" onclick="closeBackup()">關閉</button>
  </div>
</div>

<!-- Top bar -->
<div id="topbar">
  <button class="btn-sm" onclick="openMenu()">☰ 分類</button>
  <button class="map-btn" onclick="openMap()" title="地圖選地區">🗾</button>
  <button id="btn-search" onclick="openSearch()" title="搜尋單字">🔍</button>
  <button class="map-btn" onclick="openQuiz()" title="單字測驗">📝</button>
  <button class="save-btn" onclick="openBackup()">💾 <span class="save-count" id="top-count">0</span></button>
</div>

<!-- Card -->
<div id="card-wrap">
  <div id="card">
    <div class="learned-border" id="learned-border"></div>
    <!-- Back -->
    <div id="back">
      <div class="level-badge" id="level-badge"></div>
      <div class="learned-tag" id="learned-tag">✓ 已學會</div>
      <div class="card-cat" id="card-cat"></div>
      <div id="card-jp"></div>
      <div class="card-kana" id="card-kana"></div>
      <div class="slide-hint" id="slide-hint">向右滑動揭開答案 →</div>
    </div>
    <!-- Front -->
    <div id="front">
      <div class="rev-label">意思</div>
      <div id="rev-meaning"></div>
      <div class="rev-romaji" id="rev-romaji"></div>
      <div class="rev-example">
        <span id="rev-example"></span><br>
        <span class="rev-tw" id="rev-tw"></span>
      </div>
    </div>
    <!-- Handle -->
    <div id="handle">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    <!-- Flash -->
    <div id="flash">✅</div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <button class="btn-round" id="btn-back" onclick="go('back')">←</button>
    <button id="btn-speak" onclick="speak()">🔈</button>
    <button id="btn-learned" onclick="toggleLearned()">標記學會</button>
    <button class="btn-round" onclick="go('fwd')">→</button>
  </div>

  <div id="filter-hint">學會的卡片出現機率 1/6 · 進度自動儲存</div>
  <div id="review-bar">
    <button id="btn-review-toggle" onclick="toggleReviewMode()">
      <span class="review-dot"></span>複習模式
    </button>
  </div>
</div>

// ══════════════════════════════════════════
function getFiltered(){
  // 地圖篩選模式
  if(activeIds.has('GEO_REGION')&&mapFilterRegion){
    return vocab.map((w,i)=>({w,i}))
      .filter(({w})=>w.level==='GEO'&&w.region===mapFilterRegion)
      .map(({i})=>i);
  }
  return vocab.map((w,i)=>({w,i})).filter(({w})=>{
    if(activeIds.has('ALL')) return true;
    return [...activeIds].some(id=>{
      const g=GROUPS.find(g=>g.id===id);
      return g&&g.filter&&g.filter(w);
    });
  }).map(({i})=>i);
}

function toggleReviewMode(){
  reviewMode=!reviewMode;
  const btn=document.getElementById('btn-review-toggle');
  btn.classList.toggle('on', reviewMode);
  btn.querySelector('.review-dot').style.background=reviewMode?'#c0392b':'rgba(0,0,0,0.15)';
  updateFilterHint();
}

function pickNext(excl){
  const f=getFiltered();
  const pool=f.length>1?f.filter(i=>i!==excl):f;
  if(reviewMode){
    // All cards equal weight in review mode
    return pool[Math.floor(Math.random()*pool.length)];
  }
  const tot=pool.reduce((s,i)=>s+(learned.has(i)?1:6),0);
  let r=Math.random()*tot;
  for(const i of pool){ r-=(learned.has(i)?1:6); if(r<=0) return i; }
  return pool[pool.length-1];
}

function encode(set){
  if(!set||set.size===0) return '';
  const arr=[...set].sort((a,b)=>a-b);
  const bytes=new Uint8Array(Math.ceil((arr[arr.length-1]+1)/8));
  arr.forEach(i=>{bytes[i>>3]|=(1<<(i&7));});
  return btoa(String.fromCharCode(...bytes)).replace(/=/g,'');
}
function decode(s){
  if(!s||!s.trim()) return new Set();
  try{
    const bin=atob(s.trim());
    const set=new Set();
    for(let i=0;i<bin.length;i++){
      const b=bin.charCodeAt(i);
      for(let j=0;j<8;j++) if(b&(1<<j)) set.add(i*8+j);
    }
    return new Set([...set].filter(i=>i<vocab.length));
  }catch(e){return new Set();}
}

function renderCard(){

  document.getElementById('btn-learned').textContent=isL?'✓ 學會了':'標記學會';
  document.getElementById('btn-learned').className='btn-learned'+(isL?' active':'');

    document.getElementById('btn-learned').style.borderColor='rgba(0,160,70,0.35)';
    document.getElementById('btn-learned').style.background='rgba(0,160,70,0.12)';
    document.getElementById('btn-learned').style.color='#1a8040';
  }else{
    document.getElementById('btn-learned').style.borderColor='rgba(0,0,0,0.1)';
    document.getElementById('btn-learned').style.background='rgba(255,255,255,0.75)';
    document.getElementById('btn-learned').style.color='rgba(0,0,0,0.45)';
  }

  document.getElementById('btn-back').disabled=(histPos===0);

}

function updateCounter(){
  const n=learned.size;
  document.getElementById('top-count').textContent=n;
  document.getElementById('menu-count').textContent=n;
  document.getElementById('menu-total').textContent=vocab.length;
  document.getElementById('menu-bar').style.width=(n/vocab.length*100)+'%';
}

function setSlider(val){
  ratio=Math.max(0,Math.min(1,val));
  const pct=Math.round((1-ratio)*100);
  document.getElementById('front').style.clipPath=`inset(0 ${pct}% 0 0)`;
  document.getElementById('handle').style.left=(ratio*100)+'%';
  document.getElementById('slide-hint').style.opacity=ratio<0.05?'1':'0';
}

function animateCard(dir,cb){
  const wrap=document.getElementById('card-wrap');
  wrap.classList.add(dir==='fwd'?'anim-fwd':'anim-back');
  setTimeout(()=>{
    cb();
    setSlider(0);
    renderCard();
    wrap.classList.remove('anim-fwd','anim-back');
  },190);
}

// ── Navigation ──
function go(dir){
  if(dir==='back'&&histPos===0) return;
  animateCard(dir,()=>{
    if(dir==='fwd'){
      if(histPos<history.length-1){ histPos++; }
      else{
        const n=pickNext(history[histPos]);
        history=history.slice(0,histPos+1);
        history.push(n);
        histPos++;
      }
    } else { histPos--; }
  });
}

// ── Learned ──
function toggleLearned(){
  const idx=history[histPos];
  if(learned.has(idx)){
    learned.delete(idx);
  } else {
    learned.add(idx);
    // flash
    const f=document.getElementById('flash');
    f.classList.add('show');
    setTimeout(()=>f.classList.remove('show'),900);
  }
  save();
  renderCard();
  updateFilterHint();
}

// ── Speak ──
function speak(){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const v=vocab[history[histPos]];
  const text=v.jp.startsWith('〜')?v.example:v.jp;
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP';u.rate=0.82;u.pitch=1.05;
  speaking=true;
  document.getElementById('btn-speak').className='btn-speak speaking';
  document.getElementById('btn-speak').textContent='🔊';
  u.onend=u.onerror=()=>{
    speaking=false;
    document.getElementById('btn-speak').className='btn-speak';
    document.getElementById('btn-speak').textContent='🔈';
  };
  speechSynthesis.speak(u);
}

function buildMenu(){
  const list=document.getElementById('menu-list');
  list.innerHTML='';
  GROUPS.forEach(g=>{
    const isAct=activeIds.has(g.id);
    const all=g.id==='ALL'?vocab.map((_,i)=>i):vocab.map((w,i)=>({w,i})).filter(({w})=>g.filter&&g.filter(w)).map(({i})=>i);
    const tot=all.length,don=all.filter(i=>learned.has(i)).length;

    const item=document.createElement('div');
    item.className='menu-item'+(isAct?' active':'');
    item.style.borderLeftColor=isAct?g.color:'transparent';

    item.innerHTML=`
      <div class="menu-check" style="border-color:${isAct?g.color:'rgba(255,255,255,0.18)'};background:${isAct?g.color:'transparent'}">${isAct?'✓':''}</div>
      <span class="menu-icon">${g.icon}</span>
      <div style="flex:1;min-width:0">
        <div class="menu-label">${g.label}</div>
        ${g.id!=='ALL'?`<div class="menu-prog">
          <div class="menu-prog-bar"><div class="menu-prog-fill" style="width:${tot>0?(don/tot*100):0}%;background:${g.color}"></div></div>
          <span class="menu-prog-num">${don}/${tot}</span>
        </div>`:''}
      </div>`;

    item.addEventListener('click',()=>{
      // 清掉地圖篩選
      mapFilterRegion=null;
      if(g.id==='ALL'){ activeIds=new Set(['ALL']); }
      else {
        activeIds.delete('ALL');
        activeIds.delete('GEO_REGION');
        if(activeIds.has(g.id)) activeIds.delete(g.id);
        else activeIds.add(g.id);
        if(activeIds.size===0) activeIds=new Set(['ALL']);
      }
      // jump to first card in filtered set
      const f=getFiltered();
      history=[f[0]??0];histPos=0;
      setSlider(0);
      renderCard();
      buildMenu();
      updateFilterHint();
    });
    list.appendChild(item);
  });
}

function updateFilterHint(){
  const el=document.getElementById('filter-hint');
  if(activeIds.has('GEO_REGION')&&mapFilterRegion){
    const f=getFiltered();
    const don=f.filter(i=>learned.has(i)).length;
    el.innerHTML=`📍 ${mapFilterRegion} &nbsp;<span style="color:var(--gold);font-weight:600">${don}/${f.length}</span> 已學會`;
  } else if(activeIds.has('ALL')){
    const tot=vocab.length, don=learned.size;
    el.innerHTML=`全部單字 &nbsp;<span style="color:var(--gold);font-weight:600">${don}/${tot}</span> 已學會${reviewMode?' · <span style="color:#c0392b">複習模式</span>':''}`;
  } else {
    const f=getFiltered();
    const don=f.filter(i=>learned.has(i)).length;
    const labels=[...activeIds].map(id=>GROUPS.find(g=>g.id===id)?.label).join(' · ');
    el.innerHTML=`${labels} &nbsp;<span style="color:var(--gold);font-weight:600">${don}/${f.length}</span> 已學會${reviewMode?' · <span style="color:#c0392b">複習模式</span>':''}`;
  }
}

function buildQuizScopes(){
  const row=document.getElementById('quiz-scope-row');
  row.innerHTML='';
  const scopes=[{id:'ALL',label:'全部'},...GROUPS.filter(g=>g.id!=='ALL'&&g.id!=='GEO_REGION').map(g=>({id:g.id,label:g.label}))];
  scopes.forEach(s=>{

    row.appendChild(b);
  });
}

function selectQuizMode(el){
  document.querySelectorAll('.quiz-mode-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  quizMode=el.dataset.mode;

function selectQuizScope(el){
  document.querySelectorAll('.quiz-scope-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  quizScope=el.dataset.scope;
}

function getQuizPool(){
  if(quizScope==='ALL') return vocab;
  const grp=GROUPS.find(g=>g.id===quizScope);
  return grp&&grp.filter ? vocab.filter(grp.filter) : vocab;
}

function shuffle(arr){return arr.slice().sort(()=>Math.random()-0.5);}

function buildQuizQuestions(count){
  const pool=getQuizPool();
  if(pool.length<4) return [];
  const picked=shuffle(pool).slice(0,count);
  return picked.map(w=>{
    let dir=quizMode==='mix'?(Math.random()<0.5?'jp2zh':'zh2jp'):quizMode;
    const others=vocab.filter(v=>v!==w&&v.meaning!==w.meaning);
    const wrongs=shuffle(others).slice(0,3);
    const isPattern=w.jp.startsWith('〜');

    if(dir==='jp2zh'){
      const sentence=w.example||w.jp;
      // highlights = array of {s, l} start+length pairs
      let highlights=[];

      if(isPattern){
        // Split pattern by 〜, get all literal keyword parts
        const parts=w.jp.split('〜').filter(p=>p.length>0);
        parts.forEach(part=>{
          // Try full match first, then shrink from end (handles negation/conjugation)
          for(let len=part.length;len>=1;len--){
            const sub=part.substring(0,len);
            const idx=sentence.indexOf(sub);
            if(idx>=0){ highlights.push({s:idx, l:len}); break; }
          }
        });
      } else {
        // Regular word: try from full length down to 1 char (handle conjugation)
        for(let len=w.jp.length;len>=1;len--){
          const sub=w.jp.substring(0,len);
          const idx=sentence.indexOf(sub);
          if(idx>=0){ highlights.push({s:idx, l:len}); break; }
        }
      }

      return {dir:'jp2zh', sentence, highlights,
        answer:w.meaning, answerJp:w.jp,
        choices:shuffle([w.meaning,...wrongs.map(v=>v.meaning)])};

    } else {
      let sentence;
      if(w.exTW&&w.exTW.includes(w.meaning)){
        sentence=w.exTW.replace(w.meaning,'＿＿＿');
      } else {
        sentence='「'+w.meaning+'」的日文是？';
      }
      return {dir:'zh2jp', sentence, highlights:[],
        answer:w.jp, answerMeaning:w.meaning,
        choices:shuffle([w.jp,...wrongs.map(v=>v.jp)])};
    }
  });
}
function startQuiz(){
  const count=parseInt(document.getElementById('quiz-count-slider').value);
  const pool=getQuizPool();
  if(pool.length<4){ alert('該分類單字不足 4 個，無法出題'); return; }
  quizQuestions=buildQuizQuestions(Math.min(count,pool.length));
  quizLastSettings={mode:quizMode,scope:quizScope,count};
  quizIdx=0; quizCorrect=0; quizWrong=0; quizSelectedChoice=null; quizWrongLog=[];
  showQuizScreen('play');
  renderQuizQuestion();
}

function retryQuiz(){
  if(!quizLastSettings) return;
  quizQuestions=buildQuizQuestions(quizLastSettings.count);
  quizIdx=0; quizCorrect=0; quizWrong=0; quizSelectedChoice=null; quizWrongLog=[];
  showQuizScreen('play');
  renderQuizQuestion();
}
function backToSetup(){ showQuizScreen('setup'); }

function showQuizScreen(s){
  document.getElementById('quiz-setup').style.display=s==='setup'?'block':'none';
  document.getElementById('quiz-play').style.display=s==='play'?'block':'none';
  document.getElementById('quiz-result').style.display=s==='result'?'block':'none';
}

function renderQuizQuestion(){
  quizSelectedChoice=null;
  const q=quizQuestions[quizIdx];
  const total=quizQuestions.length;

  document.getElementById('quiz-progress-bar').style.width=((quizIdx/total)*100)+'%';
  document.getElementById('quiz-q-num').textContent=(quizIdx+1)+' / '+total;
  document.getElementById('quiz-direction-badge').textContent=q.dir==='jp2zh'?'日→中':'中→日';

  // sentence rendering
  const sentEl=document.getElementById('quiz-sentence');
  sentEl.className='quiz-sentence'+(q.dir==='zh2jp'?' zh-sent':'');
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  if(q.dir==='jp2zh' && q.highlights && q.highlights.length>0){
    // Build HTML with highlighted segments
    // Sort highlights by position, merge overlapping
    const hl=q.highlights.slice().sort((a,b)=>a.s-b.s);
    let result='', pos=0;
    hl.forEach(h=>{
      if(h.s>pos) result+=esc(q.sentence.substring(pos,h.s));
      result+='<span class="quiz-pattern-ul">'+esc(q.sentence.substring(h.s,h.s+h.l))+'</span>';
      pos=h.s+h.l;
    });
    if(pos<q.sentence.length) result+=esc(q.sentence.substring(pos));
    sentEl.innerHTML=result;
  } else if(q.sentence&&q.sentence.includes('＿＿＿')){
    const parts=q.sentence.split('＿＿＿');
    sentEl.innerHTML=esc(parts[0])+'<span class="quiz-blank">＿＿＿</span>'+esc(parts.slice(1).join(''));
  } else {
    sentEl.textContent=q.sentence||'';
  }

    document.getElementById('quiz-sentence-tw').textContent='';

  const dirEl=document.getElementById('quiz-q-direction');
  dirEl.textContent=q.dir==='jp2zh'?'選出畫線單字的中文意思':'選出空格的日文';

  // choices
  const box=document.getElementById('quiz-choices');
  box.innerHTML='';
  q.choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='quiz-choice';
    btn.textContent=c;
    if(q.dir==='zh2jp'){
      btn.style.fontFamily="'Noto Serif JP',serif";
      btn.style.fontSize='clamp(11px,3.5vw,14px)';
    }
    btn.onclick=()=>selectChoice(btn,c);
    box.appendChild(btn);
  });

  // confirm button reset
  const conf=document.getElementById('btn-quiz-confirm');
  conf.textContent='請先選擇答案';
  conf.className='';
  conf.id='btn-quiz-confirm';
}

function selectChoice(btn, val){
  document.querySelectorAll('.quiz-choice').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  quizSelectedChoice=val;
  const conf=document.getElementById('btn-quiz-confirm');
  const isLast=quizIdx===quizQuestions.length-1;
  conf.textContent=isLast?'確定並查看成績':'確定';
  conf.className='ready';
}

function confirmQuiz(){
  const conf=document.getElementById('btn-quiz-confirm');
  if(!conf.classList.contains('ready')) return;
  const q=quizQuestions[quizIdx];
  const correct=quizSelectedChoice===q.answer;
  if(correct){ quizCorrect++; }
  else {
    quizWrong++;
    quizWrongLog.push({q, chosen:quizSelectedChoice});
  }
  quizIdx++;
  if(quizIdx>=quizQuestions.length){
    showResult();
  } else {
    renderQuizQuestion();
  }
}

function showResult(){
  showQuizScreen('result');
  const total=quizQuestions.length;
  const pct=Math.round(quizCorrect/total*100);
  let emoji='😅',title='繼續加油！';
  if(pct>=90){emoji='🏆';title='太厲害了！';}
  else if(pct>=70){emoji='🎉';title='表現不錯！';}
  else if(pct>=50){emoji='😊';title='繼續努力！';}

  document.getElementById('quiz-result-emoji').textContent=emoji;
  document.getElementById('quiz-result-title').textContent=title;
  document.getElementById('quiz-result-score').textContent=quizCorrect+'/'+total;
  document.getElementById('quiz-result-detail').textContent='答對率 '+pct+'%　✓ '+quizCorrect+'　✗ '+quizWrong;
  document.getElementById('quiz-progress-bar').style.width='100%';

  // Wrong review
  const reviewLabel=document.getElementById('quiz-review-label');
  const reviewList=document.getElementById('quiz-review-list');
  reviewList.innerHTML='';

  if(quizWrongLog.length===0){
    reviewLabel.style.display='none';
    const d=document.createElement('div');
    d.className='quiz-review-none';
    d.textContent='🎊 全部答對！';
    reviewList.appendChild(d);
  } else {
    reviewLabel.style.display='block';
    reviewLabel.textContent='✗ 答錯的題目（'+quizWrongLog.length+' 題）';
    quizWrongLog.forEach(({q,chosen})=>{
      const item=document.createElement('div');
      item.className='quiz-review-item';
      const sentHtml=q.sentence.replace('＿＿＿','<span style="color:#e07060;font-weight:600">'+q.answer+'</span>');
      const isZh=q.dir==='zh2jp';
      item.innerHTML=`
        <div class="quiz-review-sentence${isZh?' zh-sent':''}">${sentHtml}</div>
        <div class="quiz-review-row">
          <span class="quiz-review-your">${chosen||'（未作答）'}</span>
          <span class="quiz-review-arrow">→</span>
          <span class="quiz-review-correct">${q.answer}</span>
        </div>`;
      reviewList.appendChild(item);
    });
  }
}

function openSearch(){
  document.getElementById('search-overlay').classList.remove('hidden');
  document.getElementById('search-input').value='';
  renderSearch();
  setTimeout(()=>document.getElementById('search-input').focus(),100);
}
function closeSearch(){
  document.getElementById('search-overlay').classList.add('hidden');
}
function renderSearch(){
  const q=document.getElementById('search-input').value.trim();
  const box=document.getElementById('search-results');
  box.innerHTML='';
  let matches=[];
  if(q.length===0){
    // show current filtered set (first 40)
    matches=getFiltered().slice(0,40);
  } else {
    const ql=q.toLowerCase();
    matches=vocab.map((w,i)=>({w,i})).filter(({w})=>
      w.jp.includes(q)||w.kana.includes(q)||
      w.meaning.includes(q)||w.romaji.toLowerCase().includes(ql)||
      (w.example&&w.example.includes(q))
    ).map(({i})=>i).slice(0,40);
  }
  if(matches.length===0){
    box.innerHTML='<div id="search-empty">找不到相關單字</div>';
    return;
  }
  matches.forEach(idx=>{
    const w=vocab[idx];
    const bm=BM[w.level]||{bg:'rgba(0,0,0,0.06)',color:'rgba(0,0,0,0.35)',label:w.level};
    const div=document.createElement('div');
    div.className='search-item';
    div.innerHTML=`
      <div>
        <div class="si-jp">${w.jp}</div>
        <div class="si-kana">${w.kana!==w.jp?w.kana:''}</div>
      </div>
      <div class="si-meaning">${w.meaning}</div>
      <div class="si-badge" style="background:${bm.bg};color:${bm.color}">${bm.label}</div>`;
    div.onclick=()=>jumpToCard(idx);
    box.appendChild(div);
  });
}
function jumpToCard(idx){
  closeSearch();
  // Jump directly to this card
  history=[idx]; histPos=0;
  setSlider(0);
  renderCard();
}

// ══════════════════════════════════════════

// ══════════════════════════════════════════
renderCard();
setSlider(0);
updateFilterHint();
